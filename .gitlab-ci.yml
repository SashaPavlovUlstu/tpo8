stages:
  - install
  - unit_tests
  - ui_tests
  - sast
  - report

variables:
  NODE_ENV: test
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .npm/

install:
  stage: install
  image: node:22-bookworm-slim
  script:
    - npm ci
    - npm run build
  artifacts:
    expire_in: 1 week
    paths:
      - node_modules/
      - dist/

unit_tests:
  stage: unit_tests
  image: node:22-bookworm-slim
  needs:
    - install
  script:
    - npm test
  coverage: '/All files[^|]*\|[^|]*\s+([\d.]+)/'
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - coverage/

ui_tests:
  stage: ui_tests
  image: mcr.microsoft.com/playwright:v1.59.1-noble
  needs:
    - install
  script:
    - npm run test:ui
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - playwright-report/
      - test-results/
    reports:
      junit: test-results/playwright-junit.xml

sast:
  stage: sast
  image: semgrep/semgrep:latest
  needs: []
  script:
    - semgrep scan --config p/javascript --sarif --output semgrep.sarif . || true
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - semgrep.sarif

report:
  stage: report
  image: node:22-bookworm-slim
  needs:
    - job: unit_tests
      artifacts: true
    - job: ui_tests
      artifacts: true
    - job: sast
      artifacts: true
  script:
    - npm run report
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - ci-summary.md
